<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi cuenta — Lumina Concept Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .perfil-layout { max-width: 1100px; margin: 0 auto; padding: 100px 24px 80px; display: grid; grid-template-columns: 240px 1fr; gap: 32px; }
    .perfil-sidebar { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; height: fit-content; position: sticky; top: 100px; }
    .perfil-avatar { width: 72px; height: 72px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Syne',sans-serif; font-size: 28px; font-weight: 700; color: #080808; margin: 0 auto 12px; }
    .perfil-name { text-align: center; font-family: 'Syne',sans-serif; font-weight: 700; font-size: 16px; margin-bottom: 4px; }
    .perfil-email { text-align: center; font-size: 12px; color: var(--gray); margin-bottom: 24px; word-break: break-all; }
    .perfil-nav { display: flex; flex-direction: column; gap: 4px; }
    .perfil-nav-btn { background: none; border: none; color: var(--text); font-family: 'DM Sans',sans-serif; font-size: 14px; padding: 10px 14px; border-radius: 8px; cursor: pointer; text-align: left; transition: background .2s; display: flex; align-items: center; gap: 10px; }
    .perfil-nav-btn:hover { background: var(--surface-2, rgba(255,255,255,.05)); }
    .perfil-nav-btn.active { background: var(--accent-dim); color: var(--accent); font-weight: 600; }
    .perfil-nav-btn svg { opacity: .7; }
    .logout-btn { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 16px; color: #e74c3c !important; }
    .perfil-main { display: flex; flex-direction: column; gap: 0; }
    .perfil-section { display: none; }
    .perfil-section.active { display: block; }
    .section-title { font-family: 'Syne',sans-serif; font-size: 24px; font-weight: 700; margin-bottom: 24px; }
    .perfil-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; margin-bottom: 20px; }
    .perfil-card h3 { font-family: 'Syne',sans-serif; font-size: 16px; font-weight: 600; margin-bottom: 20px; color: var(--accent); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { font-size: 12px; font-weight: 500; color: var(--gray); text-transform: uppercase; letter-spacing: .5px; }
    .form-group input, .form-group select {
      padding: 12px 14px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: 'DM Sans',sans-serif; font-size: 14px;
      transition: border-color .2s;
    }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent); }
    .save-btn { background: var(--accent); color: #080808; border: none; border-radius: 8px; padding: 12px 28px; font-family: 'Syne',sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; transition: opacity .2s; }
    .save-btn:hover { opacity: .85; }
    .save-btn:disabled { opacity: .5; }
    .save-msg { font-size: 13px; color: var(--accent); margin-left: 12px; opacity: 0; transition: opacity .3s; }
    .save-msg.show { opacity: 1; }
    .fav-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
    .fav-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; cursor: pointer; transition: transform .2s; }
    .fav-card:hover { transform: translateY(-3px); }
    .fav-card img { width: 100%; height: 180px; object-fit: cover; }
    .fav-info { padding: 12px; }
    .fav-info .name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .fav-info .price { font-size: 13px; color: var(--accent); }
    .fav-remove { background: none; border: none; color: var(--gray); font-size: 18px; cursor: pointer; float: right; line-height: 1; }
    .fav-empty { text-align: center; padding: 48px 0; color: var(--gray); }
    .fav-empty svg { margin-bottom: 12px; opacity: .4; }
    .order-item { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 12px; }
    .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .order-id { font-family: 'Syne',sans-serif; font-size: 13px; font-weight: 600; }
    .order-date { font-size: 12px; color: var(--gray); }
    .order-status { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 100px; }
    .order-status.completed { background: rgba(196,255,0,.15); color: var(--accent); }
    .order-status.pending   { background: rgba(255,200,0,.15); color: #ffc800; }
    .order-status.failed    { background: rgba(231,76,60,.15); color: #e74c3c; }
    .order-total { font-size: 18px; font-weight: 700; color: var(--accent); }
    .orders-empty { text-align: center; padding: 48px 0; color: var(--gray); }
    .loading { text-align: center; padding: 32px; color: var(--gray); font-size: 14px; }
    @media (max-width: 768px) {
      .perfil-layout { grid-template-columns: 1fr; padding: 80px 16px 60px; }
      .perfil-sidebar { position: static; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>

  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag("js", new Date());
    gtag("config", "G-XXXXXXXXXX");
  </script>
</head>
<body>

<!-- NAV -->
<nav class="nav" id="mainNav">
  <a href="index.html" class="nav-logo">LUMIN<span>A</span></a>
  <ul class="nav-links">
    <li><a href="index.html">Inicio</a></li>
    <li><a href="catalogo.html">Catálogo</a></li>
    <li><a href="nosotros.html">Nosotros</a></li>
    <li><a href="mayoristas.html">Mayoristas</a></li>
    <li><a href="contacto.html">Contacto</a></li>
  </ul>
  <div class="nav-actions">
    <a href="carrito.html" class="btn-cart">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      Carrito <span class="cart-count">0</span>
    </a>
  </div>
</nav>

<div class="perfil-layout">

  <!-- SIDEBAR -->
  <aside class="perfil-sidebar">
    <div class="perfil-avatar" id="avatarEl">?</div>
    <div class="perfil-name" id="sidebarName">Cargando...</div>
    <div class="perfil-email" id="sidebarEmail"></div>

    <nav class="perfil-nav">
      <button class="perfil-nav-btn active" onclick="showTab('perfil', this)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Mi perfil
      </button>
      <button class="perfil-nav-btn" onclick="showTab('favoritos', this)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        Mis favoritos
      </button>
      <button class="perfil-nav-btn" onclick="showTab('pedidos', this)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
        Mis pedidos
      </button>
      <button class="perfil-nav-btn logout-btn" onclick="signOut()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Cerrar sesión
      </button>
    </nav>
  </aside>

  <!-- MAIN -->
  <main class="perfil-main">

    <!-- TAB: PERFIL -->
    <div class="perfil-section active" id="tab-perfil">
      <h2 class="section-title">Mi perfil</h2>

      <div class="perfil-card">
        <h3>Información personal</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>Nombre</label>
            <input type="text" id="f-nombre" placeholder="María" />
          </div>
          <div class="form-group">
            <label>Apellidos</label>
            <input type="text" id="f-apellidos" placeholder="García López" />
          </div>
          <div class="form-group">
            <label>Teléfono / WhatsApp</label>
            <input type="tel" id="f-telefono" placeholder="+593 99 123 4567" />
          </div>
          <div class="form-group">
            <label>Cédula / Pasaporte</label>
            <input type="text" id="f-cedula" placeholder="0912345678" />
          </div>
        </div>
      </div>

      <div class="perfil-card">
        <h3>Dirección de envío</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>Ciudad</label>
            <select id="f-ciudad">
              <option value="">Seleccionar ciudad</option>
              <option>Guayaquil</option>
              <option>Quito</option>
              <option>Cuenca</option>
              <option>Manta</option>
              <option>Ambato</option>
              <option>Loja</option>
              <option>Machala</option>
              <option>Otra</option>
            </select>
          </div>
          <div class="form-group">
            <label>Sector / Barrio</label>
            <input type="text" id="f-sector" placeholder="Urdesa, Samborondón..." />
          </div>
          <div class="form-group full">
            <label>Dirección completa</label>
            <input type="text" id="f-direccion" placeholder="Av. Francisco de Orellana y Calle 2..." />
          </div>
        </div>
      </div>

      <div style="display:flex;align-items:center">
        <button class="save-btn" onclick="handleSaveProfile()">Guardar cambios</button>
        <span class="save-msg" id="saveMsg">✓ Guardado</span>
      </div>
    </div>

    <!-- TAB: FAVORITOS -->
    <div class="perfil-section" id="tab-favoritos">
      <h2 class="section-title">Mis favoritos</h2>
      <div id="favGrid" class="fav-grid">
        <div class="loading">Cargando favoritos...</div>
      </div>
    </div>

    <!-- TAB: PEDIDOS -->
    <div class="perfil-section" id="tab-pedidos">
      <h2 class="section-title">Mis pedidos</h2>
      <div id="ordersContainer">
        <div class="loading">Cargando pedidos...</div>
      </div>
    </div>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/products.js"></script>
<script src="js/main.js"></script>
<script src="js/auth.js"></script>
<script>
  const nav = document.getElementById('mainNav');
  window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 40));

  let currentUser = null;

  // ── Cargar datos del usuario ──────────────────────────
  async function init() {
    const session = await getSession();
    if (!session) { window.location.href = 'login.html'; return; }

    currentUser = session.user;
    document.getElementById('sidebarEmail').textContent = currentUser.email;

    const profile = await getProfile();
    if (profile) {
      const name = [profile.nombre, profile.apellidos].filter(Boolean).join(' ') || currentUser.email.split('@')[0];
      document.getElementById('sidebarName').textContent = name;
      document.getElementById('avatarEl').textContent = (profile.nombre || currentUser.email)[0].toUpperCase();
      document.getElementById('f-nombre').value    = profile.nombre    || '';
      document.getElementById('f-apellidos').value = profile.apellidos || '';
      document.getElementById('f-telefono').value  = profile.telefono  || '';
      document.getElementById('f-cedula').value    = profile.cedula    || '';
      document.getElementById('f-ciudad').value    = profile.ciudad    || '';
      document.getElementById('f-sector').value    = profile.sector    || '';
      document.getElementById('f-direccion').value = profile.direccion || '';
    } else {
      document.getElementById('sidebarName').textContent = currentUser.email.split('@')[0];
      document.getElementById('avatarEl').textContent    = currentUser.email[0].toUpperCase();
    }
  }

  // ── Guardar perfil ────────────────────────────────────
  async function handleSaveProfile() {
    const btn = document.querySelector('.save-btn');
    btn.disabled = true; btn.textContent = 'Guardando...';
    try {
      await updateProfile({
        nombre:    document.getElementById('f-nombre').value.trim(),
        apellidos: document.getElementById('f-apellidos').value.trim(),
        telefono:  document.getElementById('f-telefono').value.trim(),
        cedula:    document.getElementById('f-cedula').value.trim(),
        ciudad:    document.getElementById('f-ciudad').value,
        sector:    document.getElementById('f-sector').value.trim(),
        direccion: document.getElementById('f-direccion').value.trim(),
      });
      const msg = document.getElementById('saveMsg');
      msg.classList.add('show');
      setTimeout(() => msg.classList.remove('show'), 2500);
    } catch(e) { alert('Error al guardar: ' + e.message); }
    btn.disabled = false; btn.textContent = 'Guardar cambios';
  }

  // ── Cargar favoritos ──────────────────────────────────
  async function loadFavorites() {
    const ids = await getFavorites();
    const grid = document.getElementById('favGrid');
    if (ids.length === 0) {
      grid.innerHTML = `<div class="fav-empty" style="grid-column:1/-1">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <p>No tienes favoritos aún.<br/><a href="catalogo.html" style="color:var(--accent)">Explorar catálogo →</a></p>
      </div>`;
      return;
    }
    grid.innerHTML = ids.map(id => {
      const p = getProduct(id);
      if (!p) return '';
      return `<div class="fav-card" onclick="window.location.href='producto.html?id=${p.id}'">
        <img src="${p.img.replace('w=900','w=400')}" alt="${p.name}" />
        <div class="fav-info">
          <button class="fav-remove" onclick="event.stopPropagation();removeFav(${p.id},this)" title="Quitar de favoritos">♡</button>
          <div class="name">${p.name}</div>
          <div class="price">$${p.price.toFixed(2)}</div>
        </div>
      </div>`;
    }).join('');
  }

  async function removeFav(productId, btn) {
    btn.textContent = '...';
    await toggleFavorite(productId);
    loadFavorites();
  }

  // ── Cargar pedidos ────────────────────────────────────
  async function loadOrders() {
    const orders = await getMyOrders();
    const container = document.getElementById('ordersContainer');
    if (orders.length === 0) {
      container.innerHTML = `<div class="orders-empty">
        <p>No tienes pedidos aún.<br/><a href="catalogo.html" style="color:var(--accent)">Empezar a comprar →</a></p>
      </div>`;
      return;
    }
    container.innerHTML = orders.map(o => {
      const date = new Date(o.created_at).toLocaleDateString('es-EC', { day:'2-digit', month:'short', year:'numeric' });
      const statusLabel = { completed:'Completado', pending:'Pendiente', failed:'Fallido' }[o.status] || o.status;
      const items = (o.items || []).length;
      return `<div class="order-item">
        <div class="order-header">
          <div>
            <div class="order-id"># ${o.paypal_order_id ? o.paypal_order_id.slice(-8).toUpperCase() : o.id.slice(-8).toUpperCase()}</div>
            <div class="order-date">${date} · ${items} producto${items !== 1 ? 's' : ''}</div>
          </div>
          <span class="order-status ${o.status}">${statusLabel}</span>
        </div>
        <div class="order-total">$${parseFloat(o.total).toFixed(2)}</div>
      </div>`;
    }).join('');
  }

  // ── Navegación entre tabs ─────────────────────────────
  function showTab(name, btn) {
    document.querySelectorAll('.perfil-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.perfil-nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    btn.classList.add('active');

    if (name === 'favoritos') loadFavorites();
    if (name === 'pedidos')   loadOrders();
  }

  init();
</script>
</body>
</html>
