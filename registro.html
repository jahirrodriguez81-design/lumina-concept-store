<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear cuenta — Lumina Concept Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); padding: 24px; }
    .auth-card {
      width: 100%; max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
    }
    .auth-logo { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; color: var(--text); text-decoration: none; display: block; margin-bottom: 32px; }
    .auth-logo span { color: var(--accent); }
    .auth-title { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .auth-sub { color: var(--gray); font-size: 14px; margin-bottom: 32px; }
    .auth-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .auth-field { margin-bottom: 16px; }
    .auth-field label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 8px; color: var(--text-muted, #aaa); }
    .auth-field input {
      width: 100%; padding: 13px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      transition: border-color .2s;
      box-sizing: border-box;
    }
    .auth-field input:focus { outline: none; border-color: var(--accent); }
    .auth-btn {
      width: 100%; padding: 15px;
      background: var(--accent);
      color: #080808;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .2s;
    }
    .auth-btn:hover { opacity: .85; }
    .auth-btn:disabled { opacity: .5; cursor: not-allowed; }
    .auth-link { text-align: center; margin-top: 20px; font-size: 14px; color: var(--gray); }
    .auth-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .auth-error { background: rgba(231,76,60,.15); border: 1px solid rgba(231,76,60,.3); color: #e74c3c; border-radius: 10px; padding: 12px 16px; font-size: 13px; margin-bottom: 16px; display: none; }
    .auth-error.show { display: block; }
    .auth-success { background: rgba(196,255,0,.1); border: 1px solid rgba(196,255,0,.3); color: var(--accent); border-radius: 10px; padding: 16px; font-size: 14px; text-align: center; display: none; }
    .auth-success.show { display: block; }
    .password-hint { font-size: 11px; color: var(--gray); margin-top: 4px; }
  </style>
</head>
<body>
  <div class="auth-card">
    <a href="index.html" class="auth-logo">LUMIN<span>A</span></a>
    <h1 class="auth-title">Crea tu cuenta</h1>
    <p class="auth-sub">Guarda favoritos, revisa tus pedidos y más</p>

    <div class="auth-error" id="authError"></div>
    <div class="auth-success" id="authSuccess">
      ¡Cuenta creada! Revisa tu correo para confirmar tu cuenta y luego inicia sesión.
    </div>

    <div class="auth-row">
      <div class="auth-field">
        <label>Nombre</label>
        <input type="text" id="nombre" placeholder="María" autocomplete="given-name" />
      </div>
      <div class="auth-field">
        <label>Apellidos</label>
        <input type="text" id="apellidos" placeholder="García" autocomplete="family-name" />
      </div>
    </div>

    <div class="auth-field">
      <label>Correo electrónico</label>
      <input type="email" id="email" placeholder="tu@correo.com" autocomplete="email" />
    </div>

    <div class="auth-field">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="new-password" />
      <p class="password-hint">Mínimo 6 caracteres</p>
    </div>

    <div class="auth-field">
      <label>Confirmar contraseña</label>
      <input type="password" id="password2" placeholder="••••••••" autocomplete="new-password" />
    </div>

    <button class="auth-btn" id="registerBtn" onclick="handleRegister()">Crear cuenta</button>

    <div class="auth-link">
      ¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script>
    getSession().then(s => { if (s) window.location.href = 'perfil.html'; });

    async function handleRegister() {
      const nombre   = document.getElementById('nombre').value.trim();
      const apellidos = document.getElementById('apellidos').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;
      const btn      = document.getElementById('registerBtn');
      const errEl    = document.getElementById('authError');

      errEl.classList.remove('show');

      if (!nombre || !email || !password) {
        errEl.textContent = 'Nombre, correo y contraseña son obligatorios.';
        errEl.classList.add('show'); return;
      }
      if (password.length < 6) {
        errEl.textContent = 'La contraseña debe tener al menos 6 caracteres.';
        errEl.classList.add('show'); return;
      }
      if (password !== password2) {
        errEl.textContent = 'Las contraseñas no coinciden.';
        errEl.classList.add('show'); return;
      }

      btn.disabled = true;
      btn.textContent = 'Creando cuenta...';

      try {
        await signUp(email, password, nombre, apellidos);
        document.getElementById('authSuccess').classList.add('show');
        btn.textContent = '¡Listo!';
        setTimeout(() => window.location.href = 'login.html', 3000);
      } catch(e) {
        const msg = e.message.includes('already registered')
          ? 'Este correo ya tiene una cuenta. <a href="login.html">Inicia sesión</a>'
          : e.message;
        errEl.innerHTML = msg;
        errEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Crear cuenta';
      }
    }
  </script>
</body>
</html>
