<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — Lumina Concept Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <script>(function(){var t=localStorage.getItem('lumina_theme')||'dark';document.documentElement.setAttribute('data-theme',t);}());</script>

  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7RQQ053JSF"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag("js", new Date());
    gtag("config", "G-7RQQ053JSF");
  </script>
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); padding: 24px; }
    .auth-card {
      width: 100%; max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
    }
    .auth-logo { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; color: var(--text); text-decoration: none; display: block; margin-bottom: 32px; }
    .auth-logo span { color: var(--accent); }
    .auth-title { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .auth-sub { color: var(--gray); font-size: 14px; margin-bottom: 32px; }
    .auth-field { margin-bottom: 20px; }
    .auth-field label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 8px; color: var(--text-muted, #aaa); }
    .auth-field input {
      width: 100%; padding: 14px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      transition: border-color .2s;
      box-sizing: border-box;
    }
    .auth-field input:focus { outline: none; border-color: var(--accent); }
    .auth-btn {
      width: 100%; padding: 15px;
      background: var(--accent);
      color: #080808;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .2s;
    }
    .auth-btn:hover { opacity: .85; }
    .auth-btn:disabled { opacity: .5; cursor: not-allowed; }
    .auth-link { text-align: center; margin-top: 24px; font-size: 14px; color: var(--gray); }
    .auth-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .auth-error { background: rgba(231,76,60,.15); border: 1px solid rgba(231,76,60,.3); color: #e74c3c; border-radius: 10px; padding: 12px 16px; font-size: 13px; margin-bottom: 20px; display: none; }
    .auth-error.show { display: block; }
    .auth-divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; color: var(--gray); font-size: 13px; }
    .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  </style>
</head>
<body>
  <div class="auth-card">
    <a href="index.html" class="auth-logo">LUMIN<span>A</span></a>
    <h1 class="auth-title">Bienvenida de nuevo</h1>
    <p class="auth-sub">Inicia sesión para acceder a tu cuenta</p>

    <div class="auth-error" id="authError"></div>

    <div class="auth-field">
      <label>Correo electrónico</label>
      <input type="email" id="email" placeholder="tu@correo.com" autocomplete="email" />
    </div>
    <div class="auth-field">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button class="auth-btn" id="loginBtn" onclick="handleLogin()">Iniciar sesión</button>

    <div class="auth-link" style="margin-top:16px">
      <a href="#">¿Olvidaste tu contraseña?</a>
    </div>

    <div class="auth-divider">o</div>

    <div class="auth-link">
      ¿No tienes cuenta? <a href="registro.html">Crear cuenta gratis</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Si ya está logueado, redirigir
    getSession().then(s => { if (s) window.location.href = 'perfil.html'; });

    async function handleLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('loginBtn');
      const errEl    = document.getElementById('authError');

      if (!email || !password) {
        errEl.textContent = 'Completa todos los campos.';
        errEl.classList.add('show'); return;
      }

      btn.disabled = true;
      btn.textContent = 'Ingresando...';
      errEl.classList.remove('show');

      try {
        await signIn(email, password);
        const redirect = new URLSearchParams(location.search).get('from') || 'perfil.html';
        window.location.href = redirect;
      } catch(e) {
        errEl.textContent = e.message.includes('Invalid') ? 'Correo o contraseña incorrectos.' : e.message;
        errEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Iniciar sesión';
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  </script>
</body>
</html>
