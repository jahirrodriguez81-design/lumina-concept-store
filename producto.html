<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Producto — Lumina Concept Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
  <link rel="stylesheet" href="css/styles.css" />
  <script>(function(){var t=localStorage.getItem('lumina_theme')||'dark';document.documentElement.setAttribute('data-theme',t);}());</script>

  <style>
    .product-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 64px;
      padding: calc(var(--nav-h) + 48px) 48px 80px;
      min-height: 90vh;
      align-items: start;
    }

    /* ── GALLERY ── */
    .gallery { position: sticky; top: calc(var(--nav-h) + 24px); }

    .gallery-main {
      border-radius: 20px; overflow: hidden;
      aspect-ratio: 3/4; background: var(--surface);
      position: relative;
    }

    .gallery-main img {
      width: 100%; height: 100%; object-fit: cover;
      filter: brightness(.85);
      transition: opacity .4s;
    }

    .gallery-main .badge {
      position: absolute; top: 16px; left: 16px;
      background: var(--accent); color: var(--bg);
      font-family: 'Syne', sans-serif;
      font-size: 11px; font-weight: 800;
      letter-spacing: 1px; text-transform: uppercase;
      padding: 5px 13px; border-radius: 100px;
    }

    .gallery-thumbs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    .thumb {
      aspect-ratio: 1; border-radius: 12px; overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color .2s;
    }

    .thumb img { width: 100%; height: 100%; object-fit: cover; filter: brightness(.8); transition: filter .2s; }
    .thumb:hover img, .thumb.active img { filter: brightness(1); }
    .thumb.active { border-color: var(--accent); }

    /* ── INFO PANEL ── */
    .product-info-panel { padding-top: 8px; }

    .breadcrumb {
      font-size: 12px; color: var(--gray); margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }

    .breadcrumb a { color: var(--gray); text-decoration: none; transition: color .2s; }
    .breadcrumb a:hover { color: var(--accent); }
    .breadcrumb span { color: rgba(255,255,255,.25); }

    .product-cat-label {
      font-family: 'Syne', sans-serif;
      font-size: 11px; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--accent); margin-bottom: 10px;
    }

    .product-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(28px, 3vw, 44px); font-weight: 800;
      letter-spacing: -1.5px; line-height: 1.05;
      color: var(--white);
    }

    .product-price-row {
      display: flex; align-items: baseline; gap: 12px;
      margin: 20px 0;
    }

    .price-main {
      font-family: 'Syne', sans-serif;
      font-size: 36px; font-weight: 800; color: var(--accent);
      letter-spacing: -1px;
    }

    .price-old {
      font-size: 18px; color: var(--gray);
      text-decoration: line-through; font-weight: 400;
    }

    .price-save {
      background: rgba(239,68,68,.15);
      color: #f87171;
      font-size: 12px; font-weight: 700;
      font-family: 'Syne', sans-serif;
      padding: 4px 10px; border-radius: 100px;
      letter-spacing: .5px;
    }

    .divider { border: none; border-top: 1px solid var(--gray-light); margin: 24px 0; }

    /* ── COLOR SELECTOR ── */
    .selector-label {
      font-family: 'Syne', sans-serif;
      font-size: 12px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--gray); margin-bottom: 12px;
      display: flex; justify-content: space-between;
    }

    .selector-label span { color: var(--white); }

    .color-options { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }

    .color-option {
      width: 32px; height: 32px; border-radius: 50%;
      cursor: pointer;
      border: 2px solid var(--surface);
      box-shadow: 0 0 0 1px var(--gray-border);
      transition: box-shadow .2s, transform .2s;
      position: relative;
    }

    .color-option:hover { transform: scale(1.15); }
    .color-option.active { box-shadow: 0 0 0 2px var(--accent); transform: scale(1.1); }

    /* ── SIZE SELECTOR ── */
    .size-options { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }

    .size-option {
      min-width: 44px; height: 44px; padding: 0 14px;
      background: var(--surface2); border: 1px solid var(--gray-border);
      border-radius: 10px; cursor: pointer;
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
      color: var(--gray-mid);
      display: flex; align-items: center; justify-content: center;
      transition: all .2s;
    }

    .size-option:hover { border-color: var(--accent); color: var(--accent); }
    .size-option.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }

    /* ── QTY & ADD ── */
    .buy-row { display: flex; gap: 12px; align-items: center; margin-top: 8px; }

    .qty-control {
      display: flex; align-items: center; gap: 0;
      background: var(--surface2); border: 1px solid var(--gray-border);
      border-radius: 12px; overflow: hidden;
    }

    .qty-btn {
      width: 44px; height: 52px; background: none; border: none;
      color: var(--gray); font-size: 18px; cursor: pointer;
      font-weight: 300; transition: background .2s, color .2s;
      display: flex; align-items: center; justify-content: center;
    }

    .qty-btn:hover { background: var(--surface3); color: var(--white); }

    .qty-val {
      width: 40px; text-align: center;
      font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700;
      color: var(--white);
    }

    .btn-add-cart {
      flex: 1; height: 52px; background: var(--accent); color: var(--bg);
      border: none; border-radius: 12px;
      font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800;
      cursor: pointer; transition: transform .2s, box-shadow .2s;
      letter-spacing: .3px;
    }

    .btn-add-cart:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px var(--accent-glow);
    }

    .btn-wishlist-big {
      width: 52px; height: 52px; background: var(--surface2);
      border: 1px solid var(--gray-border); border-radius: 12px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all .2s; color: var(--gray);
      font-size: 20px;
    }

    .btn-wishlist-big:hover { border-color: #EF4444; color: #EF4444; }
    .btn-wishlist-big.liked { border-color: #EF4444; color: #EF4444; background: rgba(239,68,68,.1); }

    /* ── TRUST BADGES ── */
    .trust-badges {
      display: flex; gap: 20px; flex-wrap: wrap;
      margin-top: 24px; padding-top: 24px;
      border-top: 1px solid var(--gray-light);
    }

    .trust-item {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--gray);
    }

    .trust-item svg { stroke: var(--accent); flex-shrink: 0; }

    /* ── TABS ── */
    .info-tabs { margin-top: 32px; }

    .tab-nav {
      display: flex; gap: 0;
      border-bottom: 1px solid var(--gray-light);
      margin-bottom: 24px;
    }

    .tab-btn {
      background: none; border: none; cursor: pointer;
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
      color: var(--gray); padding: 12px 20px;
      letter-spacing: .5px; text-transform: uppercase;
      position: relative; transition: color .2s;
    }

    .tab-btn::after {
      content: ''; position: absolute;
      bottom: -1px; left: 0; right: 0; height: 2px;
      background: var(--accent); transform: scaleX(0); transition: transform .3s;
    }

    .tab-btn.active { color: var(--white); }
    .tab-btn.active::after { transform: scaleX(1); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .tab-panel p { font-size: 14px; color: var(--gray); line-height: 1.8; margin-bottom: 12px; }

    .spec-list { list-style: none; }
    .spec-list li {
      display: flex; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid var(--gray-light);
      font-size: 14px;
    }
    .spec-list li:last-child { border-bottom: none; }
    .spec-list .key { color: var(--gray); }
    .spec-list .val { color: var(--white); font-weight: 600; }

    .care-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .care-list li {
      display: flex; gap: 10px; align-items: center;
      font-size: 14px; color: var(--gray-mid);
    }
    .care-list li::before { content: '—'; color: var(--accent); flex-shrink: 0; }

    /* ── RELATED ── */
    .related-section { padding: 0 48px 80px; }
    .related-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  </style>
  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7RQQ053JSF"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag("js", new Date());
    gtag("config", "G-7RQQ053JSF");
  </script>
</head>

      <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>

    </button>
    <a href="login.html" class="btn-auth" id="nav-auth-btn">

    </a>

  <button class="nav-hamburger" id="navHamburger" onclick="toggleMobileMenu()" aria-label="Menú"><span></span><span></span><span></span></button>
</nav>

<div class="product-layout" id="productLayout">
  <!-- Se llena con JS -->
  <div style="grid-column:span 2;text-align:center;padding:80px;color:var(--gray)">Cargando producto...</div>

<script>
AOS.init({ once: true, offset: 60 });

const nav = document.getElementById('mainNav');
window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 40));
const glow = document.getElementById('cursorGlow');
document.addEventListener('mousemove', e => { glow.style.left = e.clientX+'px'; glow.style.top = e.clientY+'px'; });

// ── LOAD PRODUCT ──
const params  = new URLSearchParams(location.search);
const pid     = parseInt(params.get('id')) || 1;
const product = getProduct(pid);

if (product && typeof saveRecentlyViewed === 'function') saveRecentlyViewed(product.id);

if (!product) {
  document.getElementById('productLayout').innerHTML = `
    <div style="grid-column:span 2;text-align:center;padding:80px">
      <p style="color:var(--gray);font-size:18px">Producto no encontrado</p>
      <a href="catalogo.html" class="btn btn-accent" style="margin-top:24px;display:inline-flex">Ver catálogo →</a>
    </div>`;
} else {
  document.title = `${product.name} — Lumina Concept Store`;
  renderProduct(product);
  renderRelated(product.related);
}

let selectedColor = '';
let selectedSize  = '';
let qty = 1;

function renderProduct(p) {
  const hasSale = p.oldPrice && p.oldPrice > p.price;
  const saveAmt = hasSale ? Math.round((1 - p.price / p.oldPrice) * 100) : 0;

  document.getElementById('productLayout').innerHTML = `
    <!-- GALLERY -->
    <div class="gallery" data-aos="fade-right">
      <div class="gallery-main">
        <img id="mainImg" src="${p.imgs[0]}" alt="${p.name}" />
        ${p.badge ? `<div class="badge">${p.badge}</div>` : ''}
      </div>
      <div class="gallery-thumbs">
        ${p.imgs.map((img,i) => `
          <div class="thumb ${i===0?'active':''}" onclick="switchImg('${img}', this)">
            <img src="${img}" alt="${p.name} vista ${i+1}" loading="lazy" />
          </div>`).join('')}
      </div>
    </div>

    <!-- INFO -->
    <div class="product-info-panel" data-aos="fade-left">
      <div class="breadcrumb">
        <a href="index.html">Inicio</a><span>/</span>
        <a href="catalogo.html">Catálogo</a><span>/</span>
        <a href="catalogo.html">${p.category}</a><span>/</span>
        <span style="color:var(--white)">${p.name}</span>
      </div>

      <div class="product-cat-label">${p.category} · ${p.sub}</div>
      <h1 class="product-title">${p.name}</h1>
      <div style="font-size:11px;letter-spacing:1.5px;color:#555;margin-bottom:8px;font-family:'DM Sans',sans-serif">SKU: ${typeof formatSku === 'function' ? formatSku(p.id) : 'LCS-' + String(p.id).padStart(3,'0')}</div>

      ${p.rating ? `
      <div class="star-row">
        <div class="stars">${typeof starsHTML === 'function' ? starsHTML(p.rating) : ''}</div>
        <span class="rating-num">${p.rating}</span>
        <span class="review-count"><a onclick="document.getElementById('tab-reviews')&&switchTab('reviews',document.querySelector('[onclick*=reviews]'))">(${p.reviewCount} reseñas)</a></span>
        ${typeof stockBadgeHTML === 'function' ? '&nbsp;·&nbsp;' + stockBadgeHTML(p.stock) : ''}
      </div>` : ''}

      <div class="product-price-row">
        <span class="price-main">$${p.price.toFixed(2)}</span>
        ${p.oldPrice ? `<span class="price-old">$${p.oldPrice.toFixed(2)}</span>` : ''}
        ${hasSale ? `<span class="price-save">-${saveAmt}%</span>` : ''}
      </div>

      ${p.deliveryDays ? `
      <div class="delivery-badge" style="margin-bottom:16px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
        Llega en <strong>${p.deliveryDays} días</strong> a Ecuador
      </div>` : ''}

      <hr class="divider" />

      <!-- COLOR -->
      <div class="selector-label">Color <span id="colorLabel">— Selecciona uno</span></div>
      <div class="color-options">
        ${p.colors.map(c => `
          <div class="color-option" style="background:${c.hex}" title="${c.name}"
               onclick="selectColor('${c.name}', this)"></div>`).join('')}
      </div>

      <!-- TALLA -->
      <div class="selector-label">Talla <span id="sizeLabel">— Selecciona una</span></div>
      <div class="size-options">
        ${p.sizes.map(s => `
          <button class="size-option" onclick="selectSize('${s}', this)">${s}</button>`).join('')}
      </div>

      <!-- QTY + ADD -->
      <div class="buy-row">
        <div class="qty-control">
          <button class="qty-btn" onclick="changeQty(-1)">−</button>
          <span class="qty-val" id="qtyVal">1</span>
          <button class="qty-btn" onclick="changeQty(1)">+</button>
        </div>
        <button class="btn-add-cart" onclick="handleAddToCart()">Agregar al carrito</button>
        <button class="btn-wishlist-big" id="wishBtn" onclick="toggleWish(this)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </button>
      </div>

      <!-- TRUST -->
      <div class="trust-badges">
        <div class="trust-item">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
          <span>Envío a todo Ecuador</span>
        </div>
        <div class="trust-item">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.74"/></svg>
          <span>Devolución 30 días</span>
        </div>
        <div class="trust-item">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <span>Pago 100% seguro</span>
        </div>
        <div class="trust-item">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span>Soporte 48h</span>
        </div>
      </div>

      <!-- TABS -->
      <div class="info-tabs">
        <div class="tab-nav">
          <button class="tab-btn active" onclick="switchTab('desc', this)">Descripción</button>
          <button class="tab-btn" onclick="switchTab('specs', this)">Especificaciones</button>
          <button class="tab-btn" onclick="switchTab('care', this)">Cuidados</button>
          <button class="tab-btn" onclick="switchTab('reviews', this)">Reseñas ${p.reviewCount ? `(${p.reviewCount})` : ''}</button>
        </div>

        <div class="tab-panel active" id="tab-desc">
          <p>${p.description}</p>
        </div>

        <div class="tab-panel" id="tab-specs">
          <ul class="spec-list">
            <li><span class="key">Categoría</span><span class="val">${p.category} · ${p.sub}</span></li>
            <li><span class="key">Material</span><span class="val">${p.material}</span></li>
            <li><span class="key">Tallas disponibles</span><span class="val">${p.sizes.join(' · ')}</span></li>
            <li><span class="key">Colores disponibles</span><span class="val">${p.colors.map(c=>c.name).join(' · ')}</span></li>
            <li><span class="key">Código</span><span class="val">LCS-${String(p.id).padStart(4,'0')}</span></li>
            <li><span class="key">Disponibilidad</span><span class="val" style="color:var(--accent)">En stock</span></li>
          </ul>
        </div>

        <div class="tab-panel" id="tab-care">
          <ul class="care-list">
            ${p.care.split(' · ').map(c => `<li>${c}</li>`).join('')}
          </ul>
        </div>

        <div class="tab-panel" id="tab-reviews">
          ${p.reviews && p.reviews.length ? `
          <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
            <div style="text-align:center">
              <div style="font-family:'Syne',sans-serif;font-size:48px;font-weight:800;letter-spacing:-2px;line-height:1">${p.rating}</div>
              <div style="display:flex;gap:2px;justify-content:center;margin:4px 0">${typeof starsHTML==='function'?starsHTML(p.rating):''}</div>
              <div style="font-size:12px;color:var(--gray)">${p.reviewCount} reseñas</div>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:16px">
          ${p.reviews.map(r => `
            <div class="review-card">
              <div class="review-card-header">
                <div class="reviewer-info">
                  <span class="reviewer-name">${r.name}</span>
                  <span class="reviewer-date">${r.date}</span>
                </div>
                ${r.verified ? '<span class="verified-badge">Compra verificada</span>' : ''}
              </div>
              <div class="review-stars">${typeof starsHTML==='function'?starsHTML(r.rating):''}</div>
              <p class="review-text">${r.comment}</p>
            </div>`).join('')}
          </div>` : '<p style="color:var(--gray)">Aún no hay reseñas para este producto.</p>'}
        </div>
      </div>

      ${p.related && p.related.length ? `
      <div class="combo-section">
        <div class="combo-title">Completa tu look</div>
        <div class="combo-items" id="comboItems"></div>
      </div>` : ''}
    </div>
  `;

  // Combos "completa tu look"
  const comboEl = document.getElementById('comboItems');
  if (comboEl && p.related) {
    const combos = p.related.slice(0,2).map(id => getProduct(id)).filter(Boolean);
    comboEl.innerHTML = combos.map(c => `
      <div class="combo-item" onclick="window.location.href='producto.html?id=${c.id}'">
        <img src="${c.img}" alt="${c.name}" />
        <div class="combo-item-info">
          <div class="combo-item-name">${c.name}</div>
          <div class="combo-item-price">$${c.price.toFixed(2)}</div>
        </div>
        <button class="combo-add-btn" onclick="event.stopPropagation();addToCart(${c.id},'${c.name}',${c.price},'${c.img}','','');showToast('${c.name} agregado')">+</button>
      </div>`).join('');
  }

  // Reattach AOS
  AOS.refresh();
}

function switchImg(src, thumb) {
  document.getElementById('mainImg').src = src;
  document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
  thumb.classList.add('active');
}

function selectColor(name, el) {
  selectedColor = name;
  document.getElementById('colorLabel').textContent = name;
  document.querySelectorAll('.color-option').forEach(o => o.classList.remove('active'));
  el.classList.add('active');
}

function selectSize(size, el) {
  selectedSize = size;
  document.getElementById('sizeLabel').textContent = size;
  document.querySelectorAll('.size-option').forEach(o => o.classList.remove('active'));
  el.classList.add('active');
}

function changeQty(delta) {
  qty = Math.max(1, Math.min(10, qty + delta));
  document.getElementById('qtyVal').textContent = qty;
}

function handleAddToCart() {
  if (!selectedSize && product.sizes.length > 1) {
    showToast('Selecciona una talla primero');
    return;
  }
  if (!selectedColor) {
    showToast('Selecciona un color primero');
    return;
  }
  for (let i = 0; i < qty; i++) {
    addToCart(product.id, product.name, product.price, product.imgs[0], selectedSize, selectedColor);
  }
  showToast(`${qty > 1 ? qty + 'x ' : ''}${product.name} en el carrito`);
}

async function toggleWish(btn) {
  if (typeof toggleFavorite !== 'function') { window.location.href = 'login.html'; return; }
  btn.disabled = true;
  try {
    const added = await toggleFavorite(pid);
    if (added === null) return; // redirigió a login
    btn.classList.toggle('liked', added);
    btn.querySelector('path').setAttribute('fill', added ? '#EF4444' : 'none');
    showToast(added ? '❤️ Guardado en favoritos' : 'Eliminado de favoritos');
  } catch(e) {
    showToast('Error al guardar favorito');
  } finally {
    btn.disabled = false;
  }
}

async function initWishBtn() {
  if (typeof getFavorites !== 'function') return;
  try {
    const favs = await getFavorites();
    if (favs.includes(pid)) {
      const btn = document.getElementById('wishBtn');
      if (btn) {
        btn.classList.add('liked');
        btn.querySelector('path').setAttribute('fill', '#EF4444');
      }
    }
  } catch(e) { /* usuario no logueado, no importa */ }
}
initWishBtn();

function switchTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
}

function renderRelated(ids) {
  const grid = document.getElementById('relatedGrid');
  const products = getRelated(ids);
  grid.innerHTML = products.map(p => `
    <div class="product-card" data-id="${p.id}" style="cursor:pointer" onclick="window.location.href='producto.html?id=${p.id}'">
      <div class="product-image">
        <img src="${p.img}" alt="${p.name}" loading="lazy" />
        ${p.badge ? `<span class="product-badge ${p.badge.includes('-') ? 'sale' : ''}">${p.badge}</span>` : ''}
        <button class="product-wishlist" onclick="event.stopPropagation()">♡</button>
        <button class="product-quick-add" onclick="event.stopPropagation();addToCart(${p.id},'${p.name}',${p.price},'${p.img}','','');showToast('Agregado: ${p.name}')">+ Agregar</button>
      </div>
      <div class="product-info">
        <div class="product-category">${p.category} · ${p.sub}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-footer">
          <div class="product-price">$${p.price.toFixed(2)} ${p.oldPrice ? `<span class="old">$${p.oldPrice.toFixed(2)}</span>` : ''}</div>
          <div class="color-dots">${p.colors.slice(0,3).map(c=>`<div class="color-dot" style="background:${c.hex}"></div>`).join('')}</div>
        </div>
      </div>
    </div>`).join('');
}
</script>
</body>
</html>
